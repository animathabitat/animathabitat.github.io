<!doctype html>
<html lang="en">

<script>
  function loadObject() {
    var e,
        i,
        obj_e,
        obj,
        xhttp;
    e = document.getElementsByTagName("*");
    for (i = 0; i < e.length; i++) {
      obj_e = e[i];
      obj = obj_e.getAttribute("js-obj");
      if (obj) {
        xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
          if (this.readyState == 4) {
            if (this.status == 200) {obj_e.innerHTML = this.responseText;}
            if (this.status == 404) {obj_e.innerHTML = "JS 404.<br/><em>We should have taken a left turn at Albuquerque.</em>";}
            obj_e.removeAttribute("js-obj");
            loadObject();
          }
        }
        xhttp.open("GET", obj, true);
        xhttp.send();
        return;
      }
    }
  };
</script>
